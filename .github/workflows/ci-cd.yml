# Signalboard CI/CD
# Stages: lint/test -> dependency audit -> build+push -> image scan ->
#         IaC scan -> bump image tag in gitops/overlays/dev
#
# CI never touches the cluster directly — it only updates the image tag in
# gitops/, and Argo CD (running in-cluster, watching this repo) reconciles
# from there. Keeps cluster credentials out of CI entirely.

name: signalboard-ci-cd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "app/${{ matrix.component }}/package-lock.json"
      - run: npm install
        working-directory: app/${{ matrix.component }}
      - run: npm run lint
        working-directory: app/${{ matrix.component }}
      - run: npm test
        working-directory: app/${{ matrix.component }}

  dependency-audit:
    name: SCA - dependency audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: npm audit --audit-level=high
        working-directory: app/backend
        continue-on-error: true

  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: dependency-audit
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./app/${{ matrix.component }}
          push: true
          tags: ${{ env.IMAGE_BASE }}/${{ matrix.component }}:${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  image-scan:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_BASE }}/${{ matrix.component }}:${{ needs.build-and-push.outputs.short_sha }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

  iac-scan:
    name: Checkov - Terraform & K8s manifests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          soft_fail: false
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: gitops/base/
          framework: kubernetes
          soft_fail: true

  update-gitops:
    name: Bump image tag in dev overlay
    runs-on: ubuntu-latest
    needs: [image-scan, iac-scan]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin
      - name: Set new image tags
        run: |
          cd gitops/overlays/dev
          kustomize edit set image \
            ${{ env.IMAGE_BASE }}/backend=${{ env.IMAGE_BASE }}/backend:${{ needs.build-and-push.outputs.short_sha }} \
            ${{ env.IMAGE_BASE }}/frontend=${{ env.IMAGE_BASE }}/frontend:${{ needs.build-and-push.outputs.short_sha }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/overlays/dev
          git diff --cached --quiet || git commit -m "ci: bump dev image tag to ${{ needs.build-and-push.outputs.short_sha }} [skip ci]"
          git push
      # Argo CD (already watching gitops/overlays/dev) picks up the commit
      # and syncs automatically — no cluster access from this workflow.
