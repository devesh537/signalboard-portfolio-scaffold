apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signalboard-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-username>/signalboard.git
    targetRevision: main
    path: gitops/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: signalboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
