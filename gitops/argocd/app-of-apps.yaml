apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signalboard-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devesh537/signalboard-portfolio-scaffold.git
    targetRevision: main
    path: gitops/argocd/apps/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
