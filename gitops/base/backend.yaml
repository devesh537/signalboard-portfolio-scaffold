apiVersion: apps/v1
kind: Deployment
metadata:
  name: signalboard-backend
  namespace: signalboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: signalboard-backend
  template:
    metadata:
      labels:
        app: signalboard-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: ghcr.io/devesh537/signalboard-frontend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: DB_HOST
              value: signalboard-db
            - name: DB_PORT
              value: "5432"
            - name: DB_POOL_MAX
              value: "10" # overridden per-env in overlays
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: signalboard-db-secret, key: POSTGRES_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: signalboard-db-secret, key: POSTGRES_PASSWORD } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: signalboard-db-secret, key: POSTGRES_DB } }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 300m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /api/health, port: 5000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: signalboard-backend
  namespace: signalboard
spec:
  selector:
    app: signalboard-backend
  ports:
    - port: 5000
      targetPort: 5000
